<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>

        *{
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: "inter", sans-serif;

        body{
          display: flex;
          justify-content: center;
          min-height: 100vh;
          align-items: center;
        }
        .error-message {
            color: #e53e3e;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .server-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .server-message.success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #38a169;
        }

        .server-message.error {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #e53e3e;
        }

        .body{
          display: flex;
          justify-content: center;
          min-height: 100vh;
          align-items: center;
        }

        .sign-up{
          width: 480px;
          color: black;
        }

        .form-group{
          width: 100%;
          height: 48px;
          margin: 50px 0;
        }

        .welcome-text{
          font-size: 35px;
          color: black;
          margin-bottom: 80px;
        }

        .form-group input{
          width: 100%;
          height: 100%;
          background: transparent;
          border: none;
          outline: none;
          font-size: 16px;
          padding: 15px;
          background: rgb(243, 243, 243);
        }

        .wrapper .input-box{
          width: 100%;
          height: 48px;
          margin: 50px 0;
          background: rgb(243, 243, 243);
        }

        .form-group input:focus {
          border: 1px solid black;
        }

        .btn-register{
          margin-top: 20px;
          width: 100%;
          height: 48px;
          background: black;
          border: none;
          outline: none;
          cursor: pointer;
          font-size: 16px;
          color: white;
        }

        .btn-register:hover {
          background-color: rgb(134, 134, 134);
          color: white;
        }

        .signin-link{
          font-size: 16px;
          color: rgb(134, 134, 134);
          text-align: center;
          margin-top: 31px;
        }

        .signin-link a{
          color: black;
          text-decoration: none;
          font-weight: 600;
          margin-left: 7px;
        }

        .signin-link a:hover{
          color: rgb(134, 134, 134);
        }

        .top-header{
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          background: white;
          display: flex;
          justify-content: center;
          background-color: white;
          height: 60px;
          border-bottom: 1px solid rgb(230, 230, 230);
        }

        .top-header img{
          width: 45px;
          display: flex;
        }

        .form-title {
          font-size: 12px;
        }
    </style>

</head>

<body>


  <header>
      <div class="top-header">
          <a href="a" class="logo">
              Bazar
          </a>
      </div>
  </header>

    <div class="sign-up">
        <h2 class="welcome-text">Регистрируйся и вкушай плоды Bazar</h2>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-title" for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required>
                <div class="error-message" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label class="form-title" for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label class="form-title" for="password">Пароль</label>
                <input type="password" id="password" name="password" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label class="form-title" for="confirmPassword">Подтвердите пароль</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <div class="error-message" id="confirmError"></div>
            </div>

                <button type="submit" class="btn-register" id="registerBtn">Зарегистрироваться</button>

            <div class="signin-link">
                Уже есть аккаунт? <a id="have-acc" href="/signin">Войти</a>
            </div>
        </form>

        <div id="serverMessage" class="server-message"></div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            clearErrors();

            let isValid = true;

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Валидация имени
            if (username.length < 3) {
                showError('usernameError', 'Минимум 3 символа');
                isValid = false;
            }

            // Валидация email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('emailError', 'Введите корректный email');
                isValid = false;
            }

            // Валидация пароля
            if (password.length < 8 || password.length > 24) {
                showError('passwordError', 'Пароль должен быть от 8 до 24 символов');
                isValid = false;
            }

            // Проверка совпадения
            if (password !== confirmPassword) {
                showError('confirmError', 'Пароли не совпадают');
                isValid = false;
            }

            if (!isValid) return;

            // Отправка на сервер
            try {
                const btn = document.getElementById('registerBtn');
                btn.textContent = 'Отправка...';
                btn.disabled = true;

                const formData = new FormData();
                formData.append('username', username);
                formData.append('email', email);
                formData.append('password', password);

                const response = await fetch('http://localhost:5000/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showServerMessage('success', result.message || 'Регистрация успешна! Перенаправление...');
                    document.getElementById('registerForm').reset();

                    // СОХРАНЯЕМ ТОКЕН ЕСЛИ ОН ЕСТЬ
                    if (result.token) {
                        localStorage.setItem('auth_token', result.token);
                        console.log('Токен сохранен:', result.token);
                    }

                    // ПЕРЕНАПРАВЛЕНИЕ НА СТРАНИЦУ С 3D ОБЪЕКТОМ
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);

                } else {
                    showServerMessage('error', result.error || 'Ошибка при регистрации');
                }

            } catch (error) {
                showServerMessage('error', 'Ошибка соединения с сервером');
                console.error('Error:', error);
            } finally {
                const btn = document.getElementById('registerBtn');
                btn.textContent = 'Зарегистрироваться';
                btn.disabled = false;
            }
        });

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
        }

        function showServerMessage(type, text) {
            const msgDiv = document.getElementById('serverMessage');
            msgDiv.textContent = text;
            msgDiv.className = `server-message ${type}`;
            msgDiv.style.display = 'block';

            // Не скрываем автоматически если это успех с перенаправлением
            if (type !== 'success') {
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>

</html>
